    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
<div class="container">
    <header class="header">
        <div class="header__news">
            <a href="https://www.haber7.com/mobil">
            <p class="news-title1">Hayatın her anında, Haber7 yanında!</p>
            <p class="news-title2">
                
            Haber7 mobil uygulamaları ile Türkiye gündemini yakından takip edebilirsiniz!
                                    
            </p>
            <img src="https://i12.haber7.net/assets/v2/common/images/haber7.png" class="news-logo" alt="Haber7 Mobil" style="height: 25px;">
        </a>
        </div>

        <div class="header__logo">
            <a href="#">

            </div>
                <div class="weather-degree">

                    <p class="description">Açık</p>
